<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sアセス一次試験 対策クイズ</title>
<style>
  :root {
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --primary-light: #dbeafe;
    --primary-glow: rgba(59,130,246,0.15);
    --correct: #22c55e;
    --correct-light: #dcfce7;
    --wrong: #ef4444;
    --wrong-light: #fee2e2;
    --bg: #f1f5f9;
    --card: #ffffff;
    --card-hover: #f8fafc;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
    --radius: 14px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="dark"] {
    --primary: #60a5fa;
    --primary-dark: #3b82f6;
    --primary-light: #1e3a5f;
    --primary-glow: rgba(96,165,250,0.12);
    --correct: #4ade80;
    --correct-light: #14532d;
    --wrong: #f87171;
    --wrong-light: #7f1d1d;
    --bg: #0f172a;
    --card: #1e293b;
    --card-hover: #273548;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #334155;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    margin-bottom: 20px;
  }
  .header-left h1 {
    font-size: 1.3rem;
    color: var(--primary);
    letter-spacing: -0.02em;
  }
  .header-left p {
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 2px;
  }
  .theme-toggle {
    width: 40px; height: 40px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: var(--card);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .theme-toggle:hover { background: var(--primary-light); border-color: var(--primary); }

  /* ===== STREAK BANNER ===== */
  .streak-banner {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    background: linear-gradient(135deg, #f59e0b, #f97316);
    color: white;
    border-radius: var(--radius);
    margin-bottom: 16px;
    font-weight: 700;
    font-size: 0.9rem;
    animation: streakPulse 0.5s ease;
  }
  .streak-banner.show { display: flex; }
  @keyframes streakPulse {
    0% { transform: scale(0.95); opacity: 0; }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin-bottom: 16px;
    font-size: 0.88rem;
    flex-wrap: wrap;
    gap: 8px;
    box-shadow: var(--shadow);
    transition: background var(--transition), border var(--transition);
  }
  .stats-bar .stat { display: flex; align-items: center; gap: 6px; }
  .stat-label { color: var(--muted); font-size: 0.78rem; }
  .stat-value { font-weight: 700; font-size: 1rem; }
  .stat-value.correct-count { color: var(--correct); }
  .stat-value.wrong-count { color: var(--wrong); }
  .accuracy { color: var(--primary); font-weight: 700; font-size: 1rem; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    box-shadow: var(--shadow);
  }
  .mode-btn {
    flex: 1;
    padding: 9px 6px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all var(--transition);
  }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active {
    color: white;
    background: var(--primary);
    box-shadow: 0 2px 6px rgba(59,130,246,0.3);
  }
  [data-theme="dark"] .mode-btn.active { box-shadow: 0 2px 6px rgba(96,165,250,0.25); }

  /* ===== CATEGORY FILTER ===== */
  .category-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .filter-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all var(--transition);
    font-weight: 500;
  }
  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .filter-count {
    display: inline-block;
    margin-left: 3px;
    opacity: 0.75;
    font-size: 0.72rem;
  }

  /* ===== QUESTION CARD ===== */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-lg);
    transition: background var(--transition), border var(--transition);
    animation: cardIn 0.3s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .q-number { font-size: 0.8rem; color: var(--muted); }
  .q-category {
    font-size: 0.72rem;
    background: var(--primary-light);
    color: var(--primary);
    padding: 4px 12px;
    border-radius: 12px;
    font-weight: 600;
  }
  .question-text {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.8;
  }

  /* ===== CHOICES ===== */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--card);
    cursor: pointer;
    transition: all var(--transition);
    text-align: left;
    font-size: 0.93rem;
    line-height: 1.6;
  }
  .choice-btn:hover:not(.disabled) {
    border-color: var(--primary);
    background: var(--primary-glow);
    transform: translateX(4px);
  }
  .choice-btn:active:not(.disabled) { transform: scale(0.98); }
  .choice-label {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--muted);
    transition: all var(--transition);
  }
  .choice-btn.correct-answer {
    border-color: var(--correct);
    background: var(--correct-light);
    animation: correctPop 0.4s ease;
  }
  .choice-btn.correct-answer .choice-label { background: var(--correct); color: white; }
  @keyframes correctPop {
    0% { transform: scale(1); }
    30% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
  .choice-btn.wrong-answer {
    border-color: var(--wrong);
    background: var(--wrong-light);
    animation: wrongShake 0.4s ease;
  }
  .choice-btn.wrong-answer .choice-label { background: var(--wrong); color: white; }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(2px); }
  }
  .choice-btn.disabled { cursor: default; }
  .choice-btn.disabled.dimmed { opacity: 0.4; }

  /* ===== RESULT BOX ===== */
  .result-box {
    margin-top: 20px;
    padding: 20px;
    border-radius: 12px;
    display: none;
    line-height: 1.8;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-box.show { display: block; }
  .result-box.correct-result {
    background: var(--correct-light);
    border: 1px solid var(--correct);
  }
  .result-box.wrong-result {
    background: var(--wrong-light);
    border: 1px solid var(--wrong);
  }
  .result-title { font-weight: 700; font-size: 1rem; margin-bottom: 8px; }
  .result-title.correct-title { color: var(--correct); }
  .result-title.wrong-title { color: var(--wrong); }
  .result-explanation { font-size: 0.88rem; color: var(--text); }
  .result-source {
    margin-top: 10px;
    font-size: 0.76rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }

  /* ===== NEXT BUTTON ===== */
  .next-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition);
    margin-top: 16px;
  }
  .next-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
  .next-btn:active:not(:disabled) { transform: scale(0.98); }
  .next-btn:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: default;
  }

  /* ===== PANELS ===== */
  .history-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 24px;
    margin-top: 20px;
    box-shadow: var(--shadow);
    transition: background var(--transition), border var(--transition);
  }
  .history-panel h3 {
    font-size: 0.9rem;
    margin-bottom: 12px;
    color: var(--muted);
    font-weight: 600;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.83rem;
  }
  .history-item:last-child { border-bottom: none; }
  .history-icon { font-size: 1.1rem; }
  .history-text {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .stats-card {
    background: var(--bg);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
    transition: background var(--transition);
  }
  .stats-card .sc-label { font-size: 0.73rem; color: var(--muted); margin-bottom: 2px; }
  .stats-card .sc-value { font-size: 1.2rem; font-weight: 700; }
  .cat-stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.83rem;
  }
  .cat-stats-row:last-child { border-bottom: none; }
  .cat-bar {
    width: 80px; height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-left: 8px;
  }
  .cat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .session-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .session-row:last-child { border-bottom: none; }

  /* ===== ACTION BUTTONS ===== */
  .action-btns { margin-top: 16px; display: flex; gap: 8px; }
  .action-btn {
    flex: 1; padding: 10px; border: none; border-radius: 10px;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: all var(--transition); color: white;
  }
  .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .action-btn.export { background: #64748b; }
  .action-btn.reset { background: var(--wrong); }

  @media (max-width: 480px) {
    .container { padding: 12px 10px 32px; }
    .question-card { padding: 20px 16px; border-radius: 14px; }
    .header-left h1 { font-size: 1.1rem; }
    .stats-bar { padding: 10px 14px; font-size: 0.8rem; }
    .stats-bar .stat-value, .stats-bar .accuracy { font-size: 0.9rem; }
    .mode-btn { font-size: 0.78rem; padding: 8px 4px; }
    .filter-btn { padding: 7px 11px; font-size: 0.73rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>Sアセス一次試験 対策クイズ</h1>
      <p id="headerSub">ソース資料に基づく5択問題</p>
    </div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="テーマ切替">🌙</button>
  </header>

  <div class="streak-banner" id="streakBanner">
    <span id="streakText"></span>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">出題数</span>
      <span class="stat-value" id="totalCount">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">正解</span>
      <span class="stat-value correct-count" id="correctCount">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">不正解</span>
      <span class="stat-value wrong-count" id="wrongCount">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">正答率</span>
      <span class="accuracy" id="accuracy">--%</span>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('random', this)">ランダム出題</button>
    <button class="mode-btn" onclick="setMode('weak', this)">苦手重点</button>
    <button class="mode-btn" onclick="setMode('sequential', this)">順番出題</button>
  </div>

  <div class="category-filter" id="categoryFilter"></div>

  <div id="quizArea"></div>

  <div class="history-panel" id="historyPanel" style="display:none;">
    <h3>直近の回答履歴</h3>
    <div id="historyList"></div>
  </div>

  <div class="history-panel" id="statsPanel" style="display:none;">
    <h3>学習記録（累計）</h3>
    <div id="statsContent"></div>
    <div class="action-btns">
      <button class="action-btn export" onclick="exportStats()">結果をコピー</button>
      <button class="action-btn reset" onclick="resetStats()">記録リセット</button>
    </div>
  </div>
</div>

<script>
// ===== QUESTION DATABASE (全問ソース資料から作成) =====
const questions = [

// ===== GROUP A: 理念・ビジョン (15問) =====
{category:"理念・ビジョン",question:"マツキヨココカラ＆カンパニーのグループ理念として正しいものはどれか。",choices:["美しさと健やかさを、もっと楽しく、身近に。","未来の常識を創り出し、人々の生活を変えていく","Find your \"!\" wow","価値を共創し分かち合う","人の想いに敏感で身近な存在であり続ける"],answer:1,explanation:"グループ理念は「未来の常識を創り出し、人々の生活を変えていく」と定められている。「美しさと健やかさを、もっと楽しく、身近に。」はグループビジョンである。",source:"グループ理念 - グループ理念"},
{category:"理念・ビジョン",question:"マツキヨココカラ＆カンパニーのグループビジョンとして正しいものはどれか。",choices:["未来の常識を創り出し、人々の生活を変えていく","Find your \"!\" wow","価値を共創し分かち合う","美しさと健やかさを、もっと楽しく、身近に。","輝きを増していく生活・地域社会の実現に貢献する"],answer:3,explanation:"グループビジョンは「美しさと健やかさを、もっと楽しく、身近に。」と定められている。",source:"グループ理念 - グループビジョン"},
{category:"理念・ビジョン",question:"グループ理念の説明文にある「未来の美と健康」に関連した記述として正しいものはどれか。",choices:["新たなパートナーシップを通じて、安全と安心を届ける","未来の美と健康を考え抜き、新たな顧客体験を創り出し、輝きを増していく生活・地域社会の実現に貢献する","美と健康という分野で最高の製品を開発し提供する","人々の生活に最先端のテクノロジーを届ける","持続可能な社会を実現するため、環境配慮型ビジネスを推進する"],answer:1,explanation:"グループ理念の説明文には「未来の美と健康を考え抜き、新たな顧客体験を創り出し、輝きを増していく生活・地域社会の実現に貢献する」と明記されている。",source:"グループ理念 - グループ理念"},
{category:"理念・ビジョン",question:"グループビジョンで示された目指す姿として、最も適切なものはどれか。",choices:["人々の毎日の生活がもっと楽しさに満ちたものになること","アジアNo.1のドラッグストアになること","美と健康の分野での独占的な市場シェアの確立","すべてのステークホルダーに均等な価値を提供すること","最高の製品とサービスで社会課題を解決すること"],answer:0,explanation:"グループビジョンでは「人々の毎日の生活がもっと楽しさに満ちたものになることを目指します」と記されている。",source:"グループ理念 - グループビジョン"},
{category:"理念・ビジョン",question:"グループスローガン「Find your \\\"!\\\"」の読み方として正しいものはどれか。",choices:["ファインド ユア エクスクラメーション","ファインド ユア ワオ","ファインド ユア ビックリ","ファインド ユア サプライズ","ファインド ユア ディスカバリー"],answer:1,explanation:"グループスローガン「Find your \"!\"」は「ファインド ユア ワオ」と読む。",source:"グループ理念 - グループスローガン"},
{category:"理念・ビジョン",question:"グループスローガンが表す場所の意味として最も適切なものはどれか。",choices:["安心と信頼で選ばれるかかりつけ薬局","すべての人に美と健康を平等に届ける場所","地域医療を支える健康ステーション","価格の安さと品ぞろえの豊富さを誇る場所","美と健康についての「！」にあふれた場所"],answer:4,explanation:"グループスローガンの説明では「美と健康についての「！」にあふれた場所となります」と記されている。",source:"グループ理念 - グループスローガン"},
{category:"理念・ビジョン",question:"グループスローガンに込められた感情として正しいものはどれか。",choices:["訪れるたびに、思わず笑顔になってしまうような楽しさや喜びがある","訪れるたびに、思わず涙が出るような感動がある","訪れるたびに、安らぎと満足感が得られる","訪れるたびに、新しい健康知識が身につく","訪れるたびに、驚きと敬いの念が湧き上がる"],answer:0,explanation:"スローガンの説明では「訪れるたびに、思わず笑顔になってしまうような楽しさや喜びがある」と記されている。",source:"グループ理念 - グループスローガン"},
{category:"理念・ビジョン",question:"グループシンボルのフォルムのモチーフとして正しいものはどれか。",choices:["桜の花びら","星（スター）","無限大（∞）","ハート","リボン"],answer:4,explanation:"グループシンボルは「より良い暮らしへ結び付けていく「リボン」のフォルムをモチーフに表現」されている。",source:"グループ理念 - グループシンボル"},
{category:"理念・ビジョン",question:"グループシンボルの社名に込めた思いとして正しいものはどれか。",choices:["マツモトキヨシとコカコーラが連携し新たな価値を生む決意","両ブランドが持つ価値を廃し、新ブランドを一から構築するという決意","グローバル市場での競争に勝ち抜くという強い意志","国内ドラッグストア市場における独占的地位を確立するという決意","マツモトキヨシとココカラファインの両ブランドが持つ確固たるブランド価値を継承しながら、ひとつの新しいグループを創りあげていくという決意"],answer:4,explanation:"社名には「マツモトキヨシとココカラファインの両ブランドが持つ、確固たるブランド価値を継承しながらも、ひとつの新しいグループを創りあげていくという決意を込めています」と明記。",source:"グループ理念 - グループシンボル"},
{category:"理念・ビジョン",question:"グループビジョンが大切にするものとして正しいものはどれか。",choices:["新しい技術の開発と特許の取得","人の想いに敏感で身近な存在であり続けること","高品質な独自ブランドの拡充","コスト削減による利益の最大化","社員の専門知識と資格の向上"],answer:1,explanation:"グループビジョンでは「人の想いに敏感で身近な存在であり続けることを大切にし」と明記されている。",source:"グループ理念 - グループビジョン"},
{category:"理念・ビジョン",question:"グループ理念・ビジョンの位置づけとして正しいものはどれか。",choices:["グループ社員の給与基準となるもの","すべての活動の基本となる、グループ社員の行動基準","店舗運営のための業務マニュアル","製品開発の方向性を示す研究指針","株主向けの経営理念宣言"],answer:1,explanation:"「グループ理念・ビジョン」は「グループ社員の行動基準となる、すべての活動の基本です」と定義されている。",source:"グループ理念 - グループ理念・ビジョン"},
{category:"理念・ビジョン",question:"グループシンボル・スローガンの役割として正しいものはどれか。",choices:["グループの財務目標を視覚化・言語化したもの","私たちの思いを視覚化・言語化したもので、ブランドを識別していただくための中心となるもの","株主への配当方針を示すコーポレートメッセージ","社員採用時のブランディングツール","競合他社との差別化を示す製品戦略"],answer:1,explanation:"「私たちの思いを視覚化・言語化したものであり、ブランドを識別していただくための中心となるもの」と説明されている。",source:"グループ理念 - グループシンボル・グループスローガン"},
{category:"理念・ビジョン",question:"グループビジョンで目指す「生活や地域への提供」として正しいものはどれか。",choices:["最先端の医療技術による治療サービス","より大きな安心と喜び","低価格での美容・健康製品","24時間対応の健康相談サービス","地域限定の特別プレミアム製品"],answer:1,explanation:"グループビジョンでは「生活や地域に、より大きな安心と喜びをお届けするために挑戦してまいります」と記されている。",source:"グループ理念 - グループビジョン"},
{category:"理念・ビジョン",question:"グループシンボルが表現する役割として正しいものはどれか。",choices:["より多くの人々にインスピレーションを与え、これまでにない体験を創り出していること","美と健康の商品を低価格で提供すること","医療と美容の融合を実現し新産業を創出すること","地域密着型のサービスで日本全国に健康を届けること","デジタル技術で美と健康を革新すること"],answer:0,explanation:"グループシンボルの説明では「より多くの人々にインスピレーションを与え、これまでにない体験を創り出していることを表現しています」とある。",source:"グループ理念 - グループシンボル"},
{category:"理念・ビジョン",question:"グループビジョンで積極的に取り入れるものとして正しいものはどれか。",choices:["独自の製造プロセス","伝統的な和漢薬の知恵","海外企業とのM&A戦略","新しい技術やアイディア","AI技術によるパーソナライゼーション"],answer:3,explanation:"グループビジョンでは「新しい技術やアイディアを積極的に取り入れ」と記されている。",source:"グループ理念 - グループビジョン"},

{category:"経営方針",question:"配当政策の基本方針として正しいものはどれか。",choices:["定額配当","業績連動配当","特別配当中心","株式分割で対応","累進配当（原則）"],answer:4,explanation:"配当維持又は増配を行う累進配当（原則）のもと、配当性向50%、DOE6%を目標としている。",source:"中期経営計画 P.13"},
{category:"経営方針",question:"プラットフォームビジネス戦略の中核概念として正しいものはどれか。",choices:["コスト削減の最大化","LTV（顧客生涯価値）の最大化","店舗数の最大化","PB商品の売上最大化","EC売上高の最大化"],answer:1,explanation:"差別化戦略の中核は「お客様のLTV（Life Time Value＝顧客生涯価値）最大化を図る」こと。",source:"中期経営計画 P.8"},
{category:"経営方針",question:"マツキヨココカラMe（ミー）のサービス内容として正しいものはどれか。",choices:["対象商品の最短当日配送の宅配サービス","メイクや肌・髪質の測定ができる美容パーソナルサービス","サプリメントをECでシームレスに体験するサービス","調剤サービスをデジタル化し利便性向上・待ち時間短縮を実現","ポイント管理・クーポン配信のロイヤリティサービス"],answer:3,explanation:"マツキヨココカラMe（ミー）はアプリを通じて調剤サービスをデジタル化し、利便性向上・待ち時間短縮・シームレスな体験を提供するサービス。",source:"中期経営計画 P.9"},
{category:"経営方針",question:"マツキヨココカラQ（キュー）のサービス内容として正しいものはどれか。",choices:["対象商品で最短当日配送の宅配サービス","美容パーソナルサービス","調剤デジタルサービス","サプリメントECサービス","店頭在庫確認サービス"],answer:0,explanation:"マツキヨココカラQ（キュー）は対象商品購入で最短当日配送の宅配サービス。簡易包装でEV車両にて配送するエコなサービス。",source:"中期経営計画 P.9"},

// ===== GROUP C: メンバー指導 JMAM (20問) =====
{category:"メンバー指導",question:"指導の基本ステップとして正しい順序はどれか。",choices:["行動変容を図らせてから、物知りにしていく","物知りにしてから、行動変容を図らせる","まず動機付けを行い、その後に知識を与える","行動変容と知識習得を同時並行で進める","まず評価を行い、その結果に基づいて指導する"],answer:1,explanation:"指導の基本ステップは「まず物知りにしていく」、次に「行動変容を図らせる」が正しい順序。",source:"JMAMレポート対策 - 問1"},
{category:"メンバー指導",question:"カウンセリング・スキルにおける「受容」によって得られる効果として正しいものはどれか。",choices:["インサイト効果（内面的気付き）","エンパワーメント効果","カタルシス効果（浄化）","モチベーション効果","コンセンサス効果"],answer:2,explanation:"「受容」によって得られるのは「カタルシス効果（浄化）」。「インサイト効果」は「自己一致」によって得られる。",source:"JMAMレポート対策 - 問1"},
{category:"メンバー指導",question:"メンバーをほめるタイミングについて最も適切な説明はどれか。",choices:["月次の面談の際にまとめてほめる","上司の承認を得た後にほめる","特別な功績があった場合にのみ公式の場でほめる","いいと思ったらその場ですぐにほめる","業務が完全に完了してから結果を評価してほめる"],answer:3,explanation:"いいと思ったらその場ですぐにほめることが重要。計画どおりの業務遂行に対してもほめることが大切。",source:"JMAMレポート対策 - 問1"},
{category:"メンバー指導",question:"メンバーを叱る際の正しい姿勢として適切なものはどれか。",choices:["全人格を対象にして根本的な問題を指摘する","感情を込めて叱ることで真剣さを伝える","過去の失敗も含めて総合的に叱責する","特定の行為にのみ限定して叱る","組織全体の前で叱ることで他の見本にする"],answer:3,explanation:"叱る対象は全人格ではなく、特定の行為にのみ限定する。感情的にならず後に引かないこと。",source:"JMAMレポート対策 - 問1"},
{category:"メンバー指導",question:"OJTのプロセスとして正しい順序はどれか。",choices:["業績 → 執務態度 → 能力","能力 → 業績 → 執務態度","執務態度 → 能力 → 業績","能力 → 執務態度 → 業績","業績 → 能力 → 執務態度"],answer:3,explanation:"OJTのプロセスは「能力 → 執務態度 → 業績」。評価のプロセスとは逆。",source:"JMAMレポート対策 - 問2"},
{category:"メンバー指導",question:"OJTの定義として最も正確なものはどれか。",choices:["職場組織内で熟練者が非熟練者に対して直接的に日常業務を通じて行う訓練","職場外で個人学習を中心に行う能力開発","上司が月1回の面談を通じて行う指導","外部研修機関で専門講師が体系的に行う訓練","人事部門が主導する計画的な人材育成プログラム"],answer:0,explanation:"OJTとは「職場組織内」で熟練者が非熟練者に直接的に日常業務を通じて行う訓練。",source:"JMAMレポート対策 - 問2"},
{category:"メンバー指導",question:"マネジャーの権限の活用について最も望ましい使い方はどれか。",choices:["組織の規律維持のみに活用する","業務命令の徹底のためにのみ使用する","自己の地位を強化するために活用する","目標達成の強制力として使用する","周囲との信頼関係を強化するために活用する"],answer:4,explanation:"マネジャーの権限は、周囲との信頼関係を強化するために活用することが望まれる。",source:"JMAMレポート対策 - 問2"},
{category:"メンバー指導",question:"「叱る」と「怒る」の違いについて正しいものはどれか。",choices:["叱るは上位者から下位者、怒るは対等な関係での指摘","叱るは公開の場、怒るは個別の場での指摘","叱るも怒るも本質的な違いはない","叱るは感情的な指摘、怒るは理性的な問題点の指摘","叱るは合理的な理由による理性的な問題点の指摘、怒るは感情的な指摘"],answer:4,explanation:"「叱る」は合理的な理由による理性的な指摘、「怒る」は感情的な指摘。",source:"JMAMレポート対策 - 問3・問4"},
{category:"メンバー指導",question:"マネジメントの4側面として正しい組み合わせはどれか。",choices:["仕事の管理、仕事の改善、コスト管理、品質管理","仕事の管理、仕事の改善、メンバーの育成、職場の人間関係","目標設定、進捗管理、評価、フィードバック","採用、育成、配置、評価","計画、実行、チェック、改善"],answer:1,explanation:"マネジメントの4側面は「仕事の管理、仕事の改善、メンバーの育成、職場の人間関係」。",source:"JMAMレポート対策 - 問3・問4"},
{category:"メンバー指導",question:"メンバーのSOSサインとして挙げられていないものはどれか。",choices:["言い訳をする","逃避する","攻撃する","無感動になる","過剰に意欲を示す"],answer:4,explanation:"SOSサインは「言い訳、逃避、攻撃、無感動、退行」の5つ。「過剰に意欲を示す」は含まれない。",source:"JMAMレポート対策 - 問3・問4"},
{category:"メンバー指導",question:"コンセプチュアル・スキルの説明として最も適切なものはどれか。",choices:["部下への指導・育成に関する対人関係スキル","業務遂行のための技術的・専門的なスキル","複雑な状況から本質を抽出し、広い視野から課題を設計する能力","コミュニケーションとプレゼンテーション能力","数値分析や財務管理に関する定量的スキル"],answer:2,explanation:"コンセプチュアル・スキルは複雑な状況から本質を抽出し、広い視野から課題を設計する能力。",source:"JMAMレポート対策 - 問3・問4"},
{category:"メンバー指導",question:"PDSサイクルのPlan過程における目標設定指導として最も適切なものはどれか。",choices:["メンバーを参画させ自ら努力目標を設定させる","過去の実績をもとに自動的に目標を設定する","目標はトップダウンで決定しメンバーの参画は不要","マネジャーが目標を設定しメンバーに伝達する","組織目標と個人目標を完全に一致させる"],answer:0,explanation:"Plan過程ではメンバーを参画させ自ら努力目標を設定させることが重要。",source:"JMAMレポート対策 - 問5"},
{category:"メンバー指導",question:"やる気を引き出すための面接で最も重要な姿勢はどれか。",choices:["業績目標を明確に示し達成を強く求める","カウンセリング・マインドをもって面接を行い話をよく聴く","問題点を的確に指摘し改善計画を立案させる","過去の失敗を分析し繰り返さないよう指導する","評価基準を説明しメンバーの納得を得る"],answer:1,explanation:"カウンセリング・マインドをもって面接を行い話をよく聴くことが重要。",source:"JMAMレポート対策 - 問5"},
{category:"メンバー指導",question:"OJTの成否を分けるタイミングとして最も重要なのはどれか。",choices:["仕事の最中（Do）の過程のみ","仕事の後（See）の過程のみ","仕事の前（Plan）と仕事の後（See）の両過程","仕事の前（Plan）の過程のみ","全過程が均等に重要"],answer:2,explanation:"OJTの成否はPlan過程とSee過程でどれだけ有効なOJTを行っているかにかかっている。",source:"JMAMレポート対策 - 問2"},
{category:"メンバー指導",question:"メンバーの言動への対処法として最も適切なものはどれか。",choices:["厳格なルールを設けて一貫した対応をする","問題行動はその場で即座に厳しく指摘する","言動パターンを記録して人事評価に反映する","感情的にならずおおらかに構えメンバーをよく理解し認める","論理的な根拠を示して行動を矯正する"],answer:3,explanation:"感情的にならずおおらかに構え、メンバーをよく理解し認めることが大切。",source:"JMAMレポート対策 - 問3・問4"},
{category:"メンバー指導",question:"メンバーの言動を理解するための特徴として正しくないものはどれか。",choices:["時と状況と場所によって矛盾した言動をとる","マネジャーの感情や動きに敏感に反応する","他のメンバーと同じと思われることに抵抗を示す","自分の気持ちを言葉より態度や行動で表現する","論理的な説明を求め感情より事実を重視する"],answer:4,explanation:"メンバーの特徴は矛盾した言動、マネジャーへの敏感な反応、同一視への抵抗、態度での感情表現の4点。「論理・事実重視」は含まれない。",source:"JMAMレポート対策 - 問3・問4"},
{category:"メンバー指導",question:"スキルアップ指導の進め方として正しいものはどれか。",choices:["仕事のあるべき姿を設計し現状とのギャップを明らかにして業務の見直しを行わせる","仕事を他者に任せスキル習得の時間を確保させる","上司が手本を見せ続けてスキルを習得させる","まず研修に参加させその後OJTで実践させる","専門書を読ませて知識を身につけさせる"],answer:0,explanation:"仕事のあるべき姿を設計し現状とのギャップを明らかにして業務を見直すことが重要。",source:"JMAMレポート対策 - 問5"},
{category:"メンバー指導",question:"OJTの留意点として適切でないものはどれか。",choices:["能力開発の環境や条件の整備が重要","やる気やモチベーションの向上を図る","メンバーの特徴を把握し適切な仕事を割り当てる","日常業務の棚卸しや育成プランを作成する","知識・技能の伝授のみに集中し環境整備は人事部門に委ねる"],answer:4,explanation:"OJTでは知識・技能の伝授だけでなく能力開発の環境や条件の整備も重要。",source:"JMAMレポート対策 - 問3・問4"},
{category:"メンバー指導",question:"メンバーのSOSサインの一つとして正しいものはどれか。",choices:["積極的に意見を述べるようになる","退行する","規律を厳守するようになる","報連相が増える","職場の人間関係が改善される"],answer:1,explanation:"SOSサインの5つのうちの一つが「退行する」。他に言い訳、逃避、攻撃、無感動がある。",source:"JMAMレポート対策 - 問3・問4"},
{category:"メンバー指導",question:"目標管理における面接で望ましい実施方法はどれか。",choices:["半期単位で面接し進捗を確認する","目標達成後にのみ面接を実施する","面接は四半期に1回程度で十分","年間単位の大きな目標で面接を行う","できるだけ小目標の単位で実行する"],answer:4,explanation:"目標管理の面接はできるだけ小目標の単位で実行することが望ましい。",source:"JMAMレポート対策 - 問1"},

// ===== GROUP D: 労務管理 JMAM (20問) =====
{category:"労務管理",question:"手待ち時間の労働時間への該当について正しいものはどれか。",choices:["手待ち時間は労働時間に含まれない","手待ち時間は自由に利用できるため労働時間外","手待ち時間は使用者の指揮監督下にあるため労働時間に含まれる","手待ち時間は業種によって異なる","手待ち時間は労使協定で定めた場合のみ労働時間"],answer:2,explanation:"手待ち時間は使用者の指揮監督下にあり労働時間に含まれる。",source:"JMAMレポート対策 - 問1"},
{category:"労務管理",question:"1日の労働時間が8時間を超える場合の休憩時間として正しいものはどれか。",choices:["30分以上","45分以上","1時間以上","1時間30分以上","2時間以上"],answer:2,explanation:"8時間を超える場合は1時間以上の休憩が必要。",source:"JMAMレポート対策 - 問2"},
{category:"労務管理",question:"1日の労働時間が6時間以下の場合の休憩について正しいものはどれか。",choices:["就業規則で定めた時間の休憩を付与する","15分以上の休憩を付与する","労使協定で定めた時間の休憩を付与する","休憩時間を付与しなくてもよい","30分以上の休憩を付与する"],answer:3,explanation:"6時間以下の場合は休憩を付与しなくてもよい。",source:"JMAMレポート対策 - 問2"},
{category:"労務管理",question:"年次有給休暇に関する権利の組み合わせとして正しいものはどれか。",choices:["労働者側：時季変更権、使用者側：時季指定権","労働者側：時季指定権、使用者側：時季変更権","双方が時季指定権を持つ","双方が時季変更権を持つ","使用者が一方的に時季を指定できる"],answer:1,explanation:"労働者側に「時季指定権」、使用者側に「時季変更権」がある。",source:"JMAMレポート対策 - 問2"},
{category:"労務管理",question:"労働者派遣において人材派遣会社と派遣労働者の関係として正しいものはどれか。",choices:["指揮命令関係","労働者派遣契約","雇用関係","業務委託関係","請負関係"],answer:2,explanation:"人材派遣会社と派遣労働者の間には「雇用関係」がある。",source:"JMAMレポート対策 - 問2"},
{category:"労務管理",question:"派遣先会社と派遣労働者の関係として正しいものはどれか。",choices:["雇用関係","労働者派遣契約","請負関係","指揮命令関係","業務委託関係"],answer:3,explanation:"派遣先と派遣労働者の間には「指揮命令関係」がある。",source:"JMAMレポート対策 - 問2"},
{category:"労務管理",question:"月間45時間以内の時間外労働の割増賃金率として正しいものはどれか。",choices:["20%以上","10%以上","30%以上","35%以上","25%以上"],answer:4,explanation:"時間外労働の割増賃金率は25%以上。",source:"JMAMレポート対策 - 問2"},
{category:"労務管理",question:"時間外労働が深夜に及んだ場合の割増賃金率として正しいものはどれか。",choices:["25%以上","35%以上","40%以上","50%以上","60%以上"],answer:3,explanation:"時間外+深夜の割増賃金率は50%以上。",source:"JMAMレポート対策 - 問2"},
{category:"労務管理",question:"法定休日労働の割増賃金率として正しいものはどれか。",choices:["40%以上","25%以上","50%以上","35%以上","30%以上"],answer:3,explanation:"法定休日労働は35%以上。",source:"JMAMレポート対策 - 問2"},
{category:"労務管理",question:"セクハラ「対価型」の説明として正しいものはどれか。",choices:["性的な言動への対応により解雇・減給・降格などの不利益を受けること","性的な冗談や不適切な言動が継続されること","性的な言動で就業環境が不快となり能力発揮できなくなること","身体的な接触を強要されること","職場内での性差別的発言が繰り返されること"],answer:0,explanation:"対価型は性的な言動への対応により不利益を受けること。",source:"JMAMレポート対策 - 問3・問4"},
{category:"労務管理",question:"セクハラ「環境型」の説明として正しいものはどれか。",choices:["性的な言動への対応により昇格が阻害されること","性的な言動で就業環境が不快となり能力が十分に発揮できなくなること","解雇を条件に性的行為を要求されること","減給を条件に性的言動を容認するよう求められること","性的発言を断ったことで降格処分を受けること"],answer:1,explanation:"環境型は性的な言動により就業環境が不快となり能力発揮できなくなること。",source:"JMAMレポート対策 - 問3・問4"},
{category:"労務管理",question:"セクハラの保護対象について正しいものはどれか。",choices:["女性労働者のみ","管理職以外の労働者","女性だけでなく男性労働者も保護の対象","正規雇用労働者のみ","直接雇用の労働者のみ"],answer:2,explanation:"男性労働者に対するセクハラも保護対象となる。",source:"JMAMレポート対策 - 問1"},
{category:"労務管理",question:"変形労働時間制の説明として最も適切なものはどれか。",choices:["繁忙期に勤務時間を長く設定でき残業手当の増加を抑えながら法定労働時間を超えて労働させることができる制度","1日8時間を超えても割増賃金が発生しない制度","労働者が自由に始業・終業時刻を決められる制度","年間の総労働時間を労使で協定する制度","特定の日のみ法定労働時間を超えられる制度"],answer:0,explanation:"変形労働時間制は繁忙期に勤務時間を長く設定でき残業手当の増加を抑えられる制度。",source:"JMAMレポート対策 - 問3・問4"},
{category:"労務管理",question:"労使協定の定義として正しいものはどれか。",choices:["労働基準監督署と使用者が締結する協定","労働者全員の署名により締結する協定","労働者の過半数で組織する労働組合（または過半数代表者）と締結した書面による協定","取締役会と従業員代表が締結する協定","厚生労働大臣の認可を受けて締結する協定"],answer:2,explanation:"労使協定は労働者の過半数で組織する労働組合等と締結した書面による協定。",source:"JMAMレポート対策 - 問3・問4"},
{category:"労務管理",question:"コアタイムの説明として正しいものはどれか。",choices:["残業手当が割増になる時間帯","労働者が任意に選択できる労働時間帯","休憩を必ず取得する時間帯","労働者が必ず労働しなければならない時間帯","深夜労働として扱われる時間帯"],answer:3,explanation:"コアタイムは労働者が必ず労働しなければならない時間帯。",source:"JMAMレポート対策 - 問3・問4"},
{category:"労務管理",question:"ノーワーク・ノーペイの原則について正しい説明はどれか。",choices:["時間外労働に代替休暇を与えられるという原則","有休取得時には賃金を支払わなくてよいという原則","休日出勤には代休を付与しなければならない原則","残業分に必ず割増賃金を支払う原則","欠勤等で働かなかった分は賃金請求権がなく使用者にも支払い義務がない原則"],answer:4,explanation:"働かなかった分は労働者に賃金請求権がなく使用者にも支払い義務がない。",source:"JMAMレポート対策 - 問3・問4"},
{category:"労務管理",question:"年次有給休暇の届出ルールとして正しいものはどれか。",choices:["届出不要で事後報告でも認められる","少なくとも3日前までに届け出る","当日の始業時刻前までに届け出る","少なくとも1週間前までに届け出る","前日までに届け出れば取得可能"],answer:4,explanation:"法的には前日までに届け出れば取得可能。",source:"JMAMレポート対策 - 問5"},
{category:"労務管理",question:"時季変更権を行使できる条件として正しいものはどれか。",choices:["「事業の正常な運営を妨げる」客観的な理由が必要","管理職の判断があれば行使できる","複数メンバーが同時に休暇を取得する場合は行使できる","業務が繁忙期であれば行使できる","スケジュール変更に影響が生じる場合は行使できる"],answer:0,explanation:"「事業の正常な運営を妨げる」客観的な理由が必要。",source:"JMAMレポート対策 - 問5"},
{category:"労務管理",question:"ポジティブ・アクションの説明として正しいものはどれか。",choices:["雇用の場における事実上の男女差を解消するために企業が行う積極的な取り組み","障がい者雇用促進のための積極的な取り組み","高齢者雇用を促進するための積極的な取り組み","外国人労働者の雇用促進のための積極的な取り組み","非正規労働者を正規雇用に転換するための取り組み"],answer:0,explanation:"ポジティブ・アクションは雇用の場における男女差を解消するための企業の積極的取り組み。",source:"JMAMレポート対策 - 問3・問4"},
{category:"労務管理",question:"事業場外労働のみなし労働時間制が適用されない場合として正しいものはどれか。",choices:["会社貸与の携帯電話でいつでも指示を受けられる状態にある場合","具体的な指揮監督が及ばない業務の場合","外勤営業で一人で業務を行っている場合","急用連絡用のみに携帯電話を所持している場合","出張先で独立して業務を行っている場合"],answer:0,explanation:"携帯電話でいつでも指示を受けられる状態では適用されない。",source:"JMAMレポート対策 - 問1"},

// ===== GROUP E: メンバー指導 教科書deep (20問) =====
{category:"メンバー指導",question:"コーチングの手順（8ステップ）の最初のステップとして正しいものはどれか。",choices:["マネジャーとしての率直な意見を伝える","考える機会をつくる","メンバーの真の状態（現状）を具体的に把握（確認）する","メンバー自身で実施の計画を立てる","行動のフィードバックを適切に行う"],answer:2,explanation:"コーチングの手順の最初は「メンバーの真の状態（現状）を具体的に把握（確認）する」である。",source:"メンバー指導（文字起こし） 第1章 コーチングの技術"},
{category:"メンバー指導",question:"教え方の基本プロセスの正しい順序はどれか。",choices:["ほめてやる→言ってみる→やってみせる→させてみる","言ってみる→させてみる→やってみせる→ほめてやる","やってみせる→言ってみる→させてみる→ほめてやる","言ってみる→やってみせる→させてみる→ほめてやる","させてみる→言ってみる→やってみせる→ほめてやる"],answer:3,explanation:"教え方の基本プロセスは「言ってみる（説明）→やってみせる（示範）→させてみる（実習）→ほめてやる（フィードバック）」。",source:"メンバー指導（文字起こし） 第1章 教え方の基本プロセス"},
{category:"メンバー指導",question:"指導技術のStep 1「知る（知識）」におけるマネジャーの行動として正しいものはどれか。",choices:["観察する、記録する","計画する、指示する","実施する、鍛える","ほめる、叱る","考える、助言する"],answer:4,explanation:"Step 1「知る」ではマネジャーは「考える、助言する」行動をとる。",source:"メンバー指導（文字起こし） 第1章 指導技術の基本ステップ"},
{category:"メンバー指導",question:"指導技術のStep 3「慣れる（態度・意欲）」のポイントとして正しいものはどれか。",choices:["ほめ方・叱り方がポイントになる","メンバーの自主性に委ねる","マネジャーとしての知識レベルに左右される","評価基準の設定が重要になる","マネジャーとしての指導技術が問われる"],answer:0,explanation:"Step 3「慣れる」では「ほめ方・叱り方がポイントになる」とされている。",source:"メンバー指導（文字起こし） 第1章 指導技術の基本ステップ"},
{category:"メンバー指導",question:"示範の手順として正しい順序はどれか。",choices:["全体をやってみる→ポイントを指摘→質問を受ける→口頭で説明","口頭で説明→全体をやってみる→ポイントを指摘しやってみせる→質問を受ける→もう一度全体をやってみせる","質問を受ける→口頭で説明→全体をやってみる→ポイントを指摘","ポイントを指摘→全体をやってみる→口頭で説明→質問を受ける","口頭で説明→質問を受ける→全体をやってみる→ポイントを指摘"],answer:1,explanation:"示範の手順は「口頭で説明→全体をひととおりやってみる→ポイントを指摘し実際にやってみせる→質問を受ける→もう一度全体をやってみせポイントを確認」。",source:"メンバー指導（文字起こし） 第1章 示範のポイントと手順"},
{category:"メンバー指導",question:"実習のポイントとして正しくないものはどれか。",choices:["準備を十分にしポイントを決めて観察する","やる気を助長させる働きかけをする","達成基準が明確な形として示されている","メンバーに自由に工夫させ独自の方法を開発させる","フィードバック（評価）の仕組みを考慮する"],answer:3,explanation:"実習のポイントには「教えたこと以外の作業はさせない」とあり、自由に独自の方法を開発させることは含まれない。",source:"メンバー指導（文字起こし） 第1章 実習のポイントと手順"},
{category:"メンバー指導",question:"衛生要因に該当するものとして正しいものはどれか。",choices:["能力を認められること","重要な役割を担っていく職務","仕事の目標達成","興味深く魅力のある仕事","給与レベル、職場環境、雇用条件、福利厚生"],answer:4,explanation:"衛生要因は「給与レベル、職場環境、雇用条件、福利厚生など」。動機づけ要因とは区別される。",source:"メンバー指導（文字起こし） 第2章 動機づけの要素"},
{category:"メンバー指導",question:"動機づけ要因に該当しないものはどれか。",choices:["興味深く魅力のある仕事","能力を認められること","福利厚生の充実","仕事の目標達成","重要な役割を担っていく職務"],answer:2,explanation:"福利厚生は衛生要因であり、動機づけ要因ではない。",source:"メンバー指導（文字起こし） 第2章 動機づけの要素"},
{category:"メンバー指導",question:"メンバー理解のために留意すべき4つの特徴に含まれないものはどれか。",choices:["時と状況と場所によって矛盾した言動をとる","マネジャーの感情や動きに敏感に反応する","常に合理的かつ一貫した判断を行う","他のメンバーと同じと扱われることに抵抗を示す","自分の気持ちを言葉より態度や行動で表現する"],answer:2,explanation:"「常に合理的かつ一貫した判断を行う」はメンバーの特徴に含まれない。むしろ矛盾した言動をとるのが特徴。",source:"メンバー指導（文字起こし） 第1章 メンバー理解"},
{category:"メンバー指導",question:"MTPの構造における「人の側面」に含まれるものとして正しいものはどれか。",choices:["仕事の管理と仕事の改善","仕事の改善と職場の人間関係","計画立案と評価","メンバーの育成と職場の人間関係","仕事の管理とメンバーの育成"],answer:3,explanation:"MTPの構造では「仕事の側面（仕事の管理・仕事の改善）」と「人の側面（メンバーの育成・職場の人間関係）」に分かれる。",source:"メンバー指導（文字起こし） 第1章 MTPの構造"},
{category:"メンバー指導",question:"ナレッジ・マネジメントの説明として正しいものはどれか。",choices:["組織の財務情報を全社員と共有する仕組み","個人のノウハウを組織全体の知恵へと昇華させていく仕組み","従業員の研修受講履歴を管理する仕組み","業績評価データを分析する仕組み","顧客情報を一元管理する仕組み"],answer:1,explanation:"ナレッジ・マネジメントは「個人がもっている知識や情報を組織全体の知恵へと昇華させていく」仕組みである。",source:"メンバー指導（文字起こし） 第1章 OJTの機会と方法"},
{category:"メンバー指導",question:"仕事の基本サイクルの最初のステップとして正しいものはどれか。",choices:["メンバーの特徴の把握","仕事の割当て","OJT実施","仕事の棚卸し","評価・実績の検討"],answer:3,explanation:"仕事の基本サイクルは「仕事の棚卸し→メンバーの特徴の把握→仕事の割当て→OJT→評価・実績の検討」。",source:"メンバー指導（文字起こし） 第1章 日常業務の見直し"},
{category:"メンバー指導",question:"評価のプロセスとして正しい順序はどれか。",choices:["業績 → 執務態度 → 能力","業績 → 能力 → 執務態度","能力 → 業績 → 執務態度","執務態度 → 業績 → 能力","能力 → 執務態度 → 業績"],answer:0,explanation:"評価のプロセスは「業績 → 執務態度 → 能力」の順。OJTのプロセスとは逆方向。",source:"メンバー指導（文字起こし） 第1章 評価基準"},
{category:"メンバー指導",question:"人事考課のエラーのうち「ハロー効果」の説明として正しいものはどれか。",choices:["評価を実際より甘く（高く）してしまう傾向","評価結果が中央部分に偏る傾向","その人物に対してもつ印象が優先し実際の状態を歪めて見てしまうこと","自分自身を評価の基準としてしまうこと","自信のある分野では辛く評価し自信のない分野では甘く評価する傾向"],answer:2,explanation:"ハロー効果は「その人物に対してもつ印象が優先し、実際の状態を歪めて見てしまうこと」。",source:"メンバー指導（文字起こし） 第1章 人事考課エラー"},
{category:"メンバー指導",question:"人事考課エラーの「寛大化傾向」の説明として正しいものはどれか。",choices:["考課者が自分自身を評価基準にしてしまうこと","各考課項目間に論理的な相関があると思い込み一律に評価すること","自信のある分野で辛く評価する傾向","評価結果が中央部分に偏ること","評価を実際より甘く（高く）してしまう傾向"],answer:4,explanation:"寛大化傾向は「評価を実際より甘く（高く）してしまう傾向」のこと。",source:"メンバー指導（文字起こし） 第1章 人事考課エラー"},
{category:"メンバー指導",question:"カウンセリングの基本スキル5つのうち「共感」によって得られる効果として正しいものはどれか。",choices:["バディ効果","ストローク効果","モチベーション効果","インサイト効果","カタルシス効果"],answer:0,explanation:"共感によって得られるのは「バディ効果」。カタルシス効果は受容、インサイト効果は自己一致による。",source:"メンバー指導（文字起こし） 第2章 カウンセリングの基本スキル"},
{category:"メンバー指導",question:"コーチングの手順において、メンバーとマネジャーのギャップを明確にした後のステップとして正しいものはどれか。",choices:["メンバーに実行してもらう","マネジャーとしての率直な意見を伝える","行動のフィードバックを行う","メンバーの真の状態を把握する","考える機会をつくる"],answer:4,explanation:"コーチングの手順では「ギャップの明確化」の次に「考える機会をつくる」ステップが続く。",source:"メンバー指導（文字起こし） 第1章 コーチングの手順"},
{category:"メンバー指導",question:"「対比誤差」の説明として正しいものはどれか。",choices:["その人物に対してもつ印象が優先し実際の状態を歪めること","評価結果が中央部分に偏ること","自分に自信のある分野では辛く評価し、自信のない分野では甘く評価する傾向","各考課項目間に論理的な相関があると思い込むこと","評価を実際より甘くしてしまう傾向"],answer:2,explanation:"対比誤差は「自分に自信のある分野では辛く評価し、自信のない分野では甘く評価する傾向」。",source:"メンバー指導（文字起こし） 第1章 人事考課エラー"},
{category:"メンバー指導",question:"動機づけの最終目標として正しいものはどれか。",choices:["衛生要因の完全な充足","メンバーの離職率の低下","目標に向けての活力の増強","上司と部下の信頼関係の構築","職場環境の改善"],answer:2,explanation:"動機づけの最終目標は「目標に向けての活力の増強」にある。",source:"メンバー指導（文字起こし） 第2章 動機づけの最終目標"},
{category:"計数管理",question:"損益分岐点売上高の計算式として正しいものはどれか。",choices:["売上高 ×（固定費 ÷ 変動費）","（固定費 + 変動費）÷ 売上高","固定費 ÷（売上高 - 変動費）","変動費 ÷（1 - 固定費÷売上高）","固定費 ÷（1 - 変動費÷売上高）"],answer:4,explanation:"損益分岐点売上高 = 固定費 ÷（1 - 変動費÷売上高）が正しい公式。",source:"計数入門（文字起こし） 第3章 損益分岐点"},

// ===== GROUP F: 計数管理 教科書deep (20問) =====
{category:"計数管理",question:"限界利益の計算式として正しいものはどれか。",choices:["売上高 - 固定費","売上高 - 変動費","売上高 - 総費用","変動費 - 固定費","固定費 - 変動費"],answer:1,explanation:"限界利益 = 売上高 - 変動費。",source:"計数入門（文字起こし） 第3章 限界利益"},
{category:"計数管理",question:"損益分岐点比率が90%以上の場合の経営状態として正しいものはどれか。",choices:["高収益経営の状態","優良経営の状態","赤字に転落するリスクがかなり高い危険な経営状態","赤字を計上している経営状態","平均的な経営状態"],answer:2,explanation:"損益分岐点比率90%以上は「ライバル企業の動向や市場の変化によって赤字に転落するリスクがかなり高い、危険な経営状態」。",source:"計数入門（文字起こし） 第3章 損益分岐点比率の目安"},
{category:"計数管理",question:"損益分岐点比率70%未満の場合の経営状態として正しいものはどれか。",choices:["危険な経営状態","赤字を計上している状態","平均的な経営状態","優良経営の状態","高い利益率を確保できる高収益経営の状態"],answer:4,explanation:"70%未満は「高い利益率を確保できる、高収益経営の状態」とされる。",source:"計数入門（文字起こし） 第3章 損益分岐点比率の目安"},
{category:"計数管理",question:"同じ種類の製品を継続して作り続ける場合に適用される原価計算の方法はどれか。",choices:["個別原価計算","直接原価計算","標準原価計算","総合原価計算","活動基準原価計算"],answer:3,explanation:"同じ種類の製品を継続して製造する場合は総合原価計算が適用される。",source:"計数入門（文字起こし） 第2章 原価計算のしくみ"},
{category:"計数管理",question:"異なる製品を個別に受注して製造する場合に適用される原価計算の方法はどれか。",choices:["総合原価計算","標準原価計算","直接原価計算","個別原価計算","活動基準原価計算"],answer:3,explanation:"異なる製品を個別に受注して製造する場合は個別原価計算が適用される。",source:"計数入門（文字起こし） 第2章 原価計算のしくみ"},
{category:"計数管理",question:"仕掛品の加工費を計算する際に用いるものとして正しいものはどれか。",choices:["材料の投入時期","販売単価","間接費の配賦基準","固定費の割合","完成までの進捗率"],answer:4,explanation:"仕掛品の加工費は「完成までの進捗率をもとに完成品に換算して計算する」。",source:"計数入門（文字起こし） 第2章 仕掛品計算"},
{category:"計数管理",question:"標準原価計算で直接材料費の差異分析を行う場合、分析する2つの差異はどれか。",choices:["材料費差異と労務費差異","時間差異と操業度差異","固定費差異と変動費差異","予算差異と能率差異","価格差異と数量差異"],answer:4,explanation:"直接材料費の差異は「価格差異」と「数量差異」に分けて分析する。",source:"計数入門（文字起こし） 第2章 標準原価差異分析"},

// ===== LOCALSTORAGE PERSISTENCE =====
const STORAGE_KEY = 's-assess-quiz-data';

function loadSavedData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function saveData() {
  const data = {
    // Cumulative stats
    totalAnswered: state.totalAnswered,
    correctAnswered: state.correctAnswered,
    wrongAnswered: state.wrongAnswered,
    // Per-question history: questionIndex -> { attempts, correct, wrong, lastSeen }
    questionStats: state.questionStats,
    // Per-category stats
    categoryStats: state.categoryStats,
    // Session history
    sessions: state.sessions,
    // Wrong question indices for weak mode
    wrongIndices: state.wrongQuestions.map(q => questions.indexOf(q)).filter(i => i >= 0),
    // Streak data
    streak: state.streak,
    maxStreak: state.maxStreak,
    // Last saved
    lastSaved: new Date().toISOString()
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

// ===== APP STATE =====
let state = {
  mode: 'random',
  activeCategories: new Set(),
  totalAnswered: 0,
  correctAnswered: 0,
  wrongAnswered: 0,
  currentQuestion: null,
  answered: false,
  history: [],
  wrongQuestions: [],
  sequentialIndex: 0,
  usedIndices: new Set(),
  questionStats: {},
  categoryStats: {},
  sessions: [],
  currentSession: { started: new Date().toISOString(), answered: 0, correct: 0 },
  streak: 0,
  maxStreak: 0
};

// ===== CATEGORIES =====
const categories = [...new Set(questions.map(q => q.category))];

function init() {
  // Load theme preference
  const savedTheme = localStorage.getItem('quiz-theme');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').textContent = '☀️';
  }

  // Load saved data
  const saved = loadSavedData();
  if (saved) {
    state.totalAnswered = saved.totalAnswered || 0;
    state.correctAnswered = saved.correctAnswered || 0;
    state.wrongAnswered = saved.wrongAnswered || 0;
    state.questionStats = saved.questionStats || {};
    state.categoryStats = saved.categoryStats || {};
    state.sessions = saved.sessions || [];
    state.wrongQuestions = (saved.wrongIndices || []).map(i => questions[i]).filter(Boolean);
    state.streak = saved.streak || 0;
    state.maxStreak = saved.maxStreak || 0;
  }
  // Init category stats & restore selection
  const savedCategories = loadCategorySelection();
  categories.forEach(c => {
    if (savedCategories) {
      if (savedCategories.includes(c)) state.activeCategories.add(c);
    } else {
      state.activeCategories.add(c);
    }
    if (!state.categoryStats[c]) {
      state.categoryStats[c] = { total: 0, correct: 0 };
    }
  });
  document.getElementById('headerSub').textContent = `全${questions.length}問 | ソース資料に基づく5択問題`;
  renderCategoryFilter();
  updateStats();
  renderStatsPanel();
  nextQuestion();
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeToggle').textContent = '🌙';
    localStorage.setItem('quiz-theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').textContent = '☀️';
    localStorage.setItem('quiz-theme', 'dark');
  }
}

function updateStreakBanner() {
  const banner = document.getElementById('streakBanner');
  const text = document.getElementById('streakText');
  if (state.streak >= 3) {
    banner.classList.add('show');
    text.textContent = `🔥 ${state.streak}連続正解！`;
  } else {
    banner.classList.remove('show');
  }
}

function renderCategoryFilter() {
  const el = document.getElementById('categoryFilter');
  const totalQ = questions.length;
  const allActive = state.activeCategories.size === categories.length;
  el.innerHTML = `<button class="filter-btn${allActive ? ' active' : ''}" onclick="toggleAllCategories(this)">全カテゴリ <span class="filter-count">${totalQ}</span></button>` +
    categories.map(c => {
      const count = questions.filter(q => q.category === c).length;
      const active = state.activeCategories.has(c);
      return `<button class="filter-btn${active ? ' active' : ''}" onclick="toggleCategory('${c}', this)">${c} <span class="filter-count">${count}</span></button>`;
    }).join('');
}

function toggleCategory(cat, btn) {
  if (state.activeCategories.has(cat)) {
    state.activeCategories.delete(cat);
    btn.classList.remove('active');
  } else {
    state.activeCategories.add(cat);
    btn.classList.add('active');
  }
  updateAllBtn();
  state.usedIndices.clear();
  state.sequentialIndex = 0;
  saveCategorySelection();
  nextQuestion();
}

function toggleAllCategories(btn) {
  const allActive = state.activeCategories.size === categories.length;
  const buttons = document.querySelectorAll('.filter-btn');
  if (allActive) {
    state.activeCategories.clear();
    buttons.forEach(b => b.classList.remove('active'));
  } else {
    categories.forEach(c => state.activeCategories.add(c));
    buttons.forEach(b => b.classList.add('active'));
  }
  state.usedIndices.clear();
  state.sequentialIndex = 0;
  saveCategorySelection();
  nextQuestion();
}

function saveCategorySelection() {
  localStorage.setItem('quiz-active-categories', JSON.stringify([...state.activeCategories]));
}

function loadCategorySelection() {
  try {
    const raw = localStorage.getItem('quiz-active-categories');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function updateAllBtn() {
  const allBtn = document.querySelector('.filter-btn');
  if (state.activeCategories.size === categories.length) {
    allBtn.classList.add('active');
  } else {
    allBtn.classList.remove('active');
  }
}

function setMode(mode, el) {
  state.mode = mode;
  state.usedIndices.clear();
  state.sequentialIndex = 0;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function getFilteredQuestions() {
  return questions.filter(q => state.activeCategories.has(q.category));
}

function pickQuestion() {
  const filtered = getFilteredQuestions();
  if (filtered.length === 0) return null;

  if (state.mode === 'weak' && state.wrongQuestions.length > 0) {
    // Pick from wrong questions that match active categories
    const weakFiltered = state.wrongQuestions.filter(q => state.activeCategories.has(q.category));
    if (weakFiltered.length > 0 && Math.random() < 0.7) {
      return weakFiltered[Math.floor(Math.random() * weakFiltered.length)];
    }
  }

  if (state.mode === 'sequential') {
    const idx = state.sequentialIndex % filtered.length;
    state.sequentialIndex++;
    return filtered[idx];
  }

  // Random mode - try to avoid repeats
  const filteredIndices = [];
  questions.forEach((q, i) => {
    if (state.activeCategories.has(q.category)) filteredIndices.push(i);
  });

  const unused = filteredIndices.filter(i => !state.usedIndices.has(i));
  if (unused.length === 0) {
    state.usedIndices.clear();
    const idx = filteredIndices[Math.floor(Math.random() * filteredIndices.length)];
    state.usedIndices.add(idx);
    return questions[idx];
  }

  const idx = unused[Math.floor(Math.random() * unused.length)];
  state.usedIndices.add(idx);
  return questions[idx];
}

// ===== 計算問題ランダム化テンプレート =====
const CALC_TEMPLATES = [
  {

      const cf1 = (Math.floor(Math.random()*8)+3)*100; // 営業CF: 300-1000

      const ans = cf1 + cf2;
      const choices = [ans - 200, ans, ans + 150, ans + 300, cf1].filter((v,i,a) => a.indexOf(v)===i);
      while(choices.length < 5) choices.push(ans + (choices.length * 50));
      const sorted = shuffleArray(choices.slice(0,5));
      return {
        category: "計数管理",
        question: `A社の営業キャッシュフローは${cf1}万円、投資キャッシュフローは${cf2}万円である。フリーキャッシュフローはいくらか。`,
        choices: sorted.map(v => v + "万円"),
        answer: sorted.indexOf(ans),
        explanation: `フリーキャッシュフロー = 営業CF + 投資CF = ${cf1} + (${cf2}) = ${ans}万円`,
        source: "計数管理問題解説1,2章 - フリーキャッシュフロー"
      };
    }
  },
  {
    category: "計数管理",

      const sales = (Math.floor(Math.random()*8)+5)*1000; // 5000-12000
      const varRate = [50,55,60,65,70][Math.floor(Math.random()*5)];
      const fixed = Math.floor(sales * (100-varRate)/100 * (0.5 + Math.random()*0.4) / 100) * 100;
      const bep = Math.round(fixed / ((100-varRate)/100));
      const choices = [bep, bep - 500, bep + 500, fixed, sales].filter((v,i,a) => a.indexOf(v)===i);
      while(choices.length < 5) choices.push(bep + (choices.length * 250));
      const sorted = shuffleArray(choices.slice(0,5));
      return {
        category: "計数管理",
        question: `売上高${sales.toLocaleString()}万円、変動費率${varRate}%、固定費${fixed.toLocaleString()}万円の場合、損益分岐点売上高はいくらか。`,
        choices: sorted.map(v => v.toLocaleString() + "万円"),
        answer: sorted.indexOf(bep),
        explanation: `損益分岐点売上高 = 固定費 ÷ (1 - 変動費率) = ${fixed.toLocaleString()} ÷ ${((100-varRate)/100)} = ${bep.toLocaleString()}万円`,
        source: "計数管理問題解説3,4章 - 損益分岐点"
      };
    }
  },
  {
    category: "計数管理",
    generate: function() {
      const lead = Math.floor(Math.random()*3)+2; // 2-4日
      const daily = Math.floor(Math.random()*8)+3; // 3-10個
      const safety = Math.floor(Math.random()*5)+2; // 2-6個
      const ans = lead * daily + safety;
      const choices = [ans, lead+daily+safety, lead*daily, daily*safety, ans+daily];
      const unique = [...new Set(choices)];
      while(unique.length < 5) unique.push(ans + unique.length * 2);
      const sorted = shuffleArray(unique.slice(0,5));
      return {
        category: "計数管理",
        question: `リードタイム${lead}日、1日あたり平均販売数量${daily}個、安全在庫${safety}個の場合、発注日の適正在庫は何個か。`,
        choices: sorted.map(v => v + "個"),
        answer: sorted.indexOf(ans),
        explanation: `適正在庫 = リードタイム × 平均販売数量 + 安全在庫 = ${lead} × ${daily} + ${safety} = ${ans}個`,
        source: "計数管理問題解説3,4章 - 適正在庫"
      };
    }
  },
  {
    category: "計数管理",
    generate: function() {
      const customers = (Math.floor(Math.random()*8)+3)*100; // 300-1000
      const rate = [20,25,30,35,40][Math.floor(Math.random()*5)];
      const items = [10,15,20,25,30][Math.floor(Math.random()*5)];
      const price = (Math.floor(Math.random()*4)+1)*100; // 100-400
      const ans = customers * (rate/100) * items * price;
      const choices = [ans, customers*items*price, customers*(rate/100)*price, customers*(rate/100)*items, ans/2];
      const unique = [...new Set(choices)];
      while(unique.length < 5) unique.push(ans + unique.length * 10000);
      const sorted = shuffleArray(unique.slice(0,5));
      return {
        category: "計数管理",
        question: `来店客数${customers}人、買上率${rate}%、買上点数${items}個、1点あたり平均単価${price}円の場合、売上高はいくらか。`,
        choices: sorted.map(v => v.toLocaleString() + "円"),
        answer: sorted.indexOf(ans),
        explanation: `売上高 = ${customers} × ${rate/100} × ${items} × ${price} = ${ans.toLocaleString()}円`,
        source: "計数管理問題解説3,4章 - 売上高計算"
      };

  },
  {
    category: "計数管理",

      const cost = (Math.floor(Math.random()*4)+1)*100; // 100-400万円

      const depRate = (1/years);
      const ans = Math.round(cost * 10000 * depRate);
      const choices = [ans, cost*10000, Math.round(ans/2), ans*2, Math.round(cost*10000/3)];
      const unique = [...new Set(choices)];
      while(unique.length < 5) unique.push(ans + unique.length * 10000);
      const sorted = shuffleArray(unique.slice(0,5));
      return {
        category: "計数管理",

        choices: sorted.map(v => v.toLocaleString() + "円"),

        source: "計数管理問題解説3,4章 - 減価償却"

];

function nextQuestion() {
  state.answered = false;
  state.currentQuestion = pickQuestion();
  if (!state.currentQuestion) {
    document.getElementById('quizArea').innerHTML =
      '<div class="question-card"><p style="text-align:center;color:var(--muted);">カテゴリを選択してください</p></div>';
    return;
  }

  // 20% chance to use a random calculation template (if 計数管理 is active)
  if (state.activeCategories.has("計数管理") && Math.random() < 0.2) {
    const tpl = CALC_TEMPLATES[Math.floor(Math.random() * CALC_TEMPLATES.length)];
    state.currentQuestion = tpl.generate();
    state.currentQuestion._generated = true;
  }

  renderQuestion();
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuestion() {
  const q = state.currentQuestion;
  const labels = ['A', 'B', 'C', 'D', 'E'];
  const area = document.getElementById('quizArea');

  // Shuffle choice order: shuffleMap[displayIndex] = originalIndex
  const indices = [0, 1, 2, 3, 4];
  state.shuffleMap = shuffleArray(indices);

  area.innerHTML = `
    <div class="question-card" style="animation:cardIn 0.3s ease">
      <div class="question-meta">
        <span class="q-number">第 ${state.totalAnswered + 1} 問</span>
        <span class="q-category">${q.category}</span>
      </div>
      <div class="question-text">${q.question}</div>
      <div class="choices">
        ${state.shuffleMap.map((origIdx, displayIdx) => `
          <button class="choice-btn" onclick="selectAnswer(${displayIdx})" id="choice-${displayIdx}">
            <span class="choice-label">${labels[displayIdx]}</span>
            <span class="choice-text">${q.choices[origIdx]}</span>
          </button>
        `).join('')}
      </div>
      <div class="result-box" id="resultBox"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>次の問題へ</button>
    </div>
  `;
}

function selectAnswer(displayIdx) {
  if (state.answered) return;
  state.answered = true;
  state.totalAnswered++;

  const q = state.currentQuestion;
  const originalIdx = state.shuffleMap[displayIdx];
  const isCorrect = originalIdx === q.answer;

  // Find which display position has the correct answer
  const correctDisplayIdx = state.shuffleMap.indexOf(q.answer);

  if (isCorrect) {
    state.correctAnswered++;
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    state.wrongQuestions = state.wrongQuestions.filter(wq => wq !== q);
  } else {
    state.wrongAnswered++;
    state.streak = 0;
    if (!state.wrongQuestions.includes(q)) {
      state.wrongQuestions.push(q);
    }
  }
  updateStreakBanner();

  // Track per-question stats
  const qIdx = questions.indexOf(q);
  if (!state.questionStats[qIdx]) {
    state.questionStats[qIdx] = { attempts: 0, correct: 0, wrong: 0, lastSeen: null };
  }
  state.questionStats[qIdx].attempts++;
  state.questionStats[qIdx][isCorrect ? 'correct' : 'wrong']++;
  state.questionStats[qIdx].lastSeen = new Date().toISOString();

  // Track per-category stats
  if (!state.categoryStats[q.category]) {
    state.categoryStats[q.category] = { total: 0, correct: 0 };
  }
  state.categoryStats[q.category].total++;
  if (isCorrect) state.categoryStats[q.category].correct++;

  // Track session
  state.currentSession.answered++;
  if (isCorrect) state.currentSession.correct++;

  // Style choices (using display indices)
  const labels = ['A', 'B', 'C', 'D', 'E'];
  for (let i = 0; i < q.choices.length; i++) {
    const btn = document.getElementById(`choice-${i}`);
    btn.classList.add('disabled');
    if (i === correctDisplayIdx) {
      btn.classList.add('correct-answer');
    } else if (i === displayIdx && !isCorrect) {
      btn.classList.add('wrong-answer');
    } else {
      btn.classList.add('dimmed');
    }
  }

  // Animate the question card
  const card = document.querySelector('.question-card');
  if (card) {
    if (!isCorrect) card.style.animation = 'wrongShake 0.4s ease';
  }

  // Show result
  const resultBox = document.getElementById('resultBox');
  resultBox.className = `result-box show ${isCorrect ? 'correct-result' : 'wrong-result'}`;
  resultBox.innerHTML = `
    <div class="result-title ${isCorrect ? 'correct-title' : 'wrong-title'}" style="animation:fadeUp 0.3s ease">
      ${isCorrect ? '正解!' : `不正解 (正解: ${labels[correctDisplayIdx]})`}
    </div>
    <div class="result-explanation">${q.explanation}</div>
    <div class="result-source">出典: ${q.source}</div>
  `;

  // Enable next button
  document.getElementById('nextBtn').disabled = false;

  // Update stats
  updateStats();

  // Update history
  state.history.unshift({
    correct: isCorrect,
    text: q.question.substring(0, 40) + '...',
    category: q.category
  });
  if (state.history.length > 10) state.history.pop();
  renderHistory();
  renderStatsPanel();

  // Save to localStorage
  saveData();
}

function updateStats() {
  document.getElementById('totalCount').textContent = state.totalAnswered;
  document.getElementById('correctCount').textContent = state.correctAnswered;
  document.getElementById('wrongCount').textContent = state.wrongAnswered;
  const acc = state.totalAnswered > 0
    ? Math.round(state.correctAnswered / state.totalAnswered * 100)
    : '--';
  document.getElementById('accuracy').textContent = acc + '%';
}

function renderHistory() {
  const panel = document.getElementById('historyPanel');
  const list = document.getElementById('historyList');
  if (state.history.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  list.innerHTML = state.history.map(h => `
    <div class="history-item">
      <span class="history-icon">${h.correct ? '\u2705' : '\u274C'}</span>
      <span class="history-text">${h.text}</span>
      <span class="q-category" style="font-size:0.7rem;">${h.category}</span>
    </div>
  `).join('');
}

function renderStatsPanel() {
  const panel = document.getElementById('statsPanel');
  const content = document.getElementById('statsContent');
  if (state.totalAnswered === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';

  const acc = Math.round(state.correctAnswered / state.totalAnswered * 100);

  // Count unique questions seen
  const seen = Object.keys(state.questionStats).length;
  const total = questions.length;

  // Category breakdown
  const catHTML = categories.map(c => {
    const cs = state.categoryStats[c] || { total: 0, correct: 0 };
    const catAcc = cs.total > 0 ? Math.round(cs.correct / cs.total * 100) : 0;
    const barColor = catAcc >= 80 ? 'var(--correct)' : catAcc >= 50 ? '#f59e0b' : 'var(--wrong)';
    const catQCount = questions.filter(q => q.category === c).length;
    const catSeen = Object.entries(state.questionStats).filter(([idx]) => questions[idx] && questions[idx].category === c).length;
    return `<div class="cat-stats-row">
      <span style="flex:1;">${c}</span>
      <span style="width:45px;text-align:right;font-weight:600;color:${barColor}">${catAcc}%</span>
      <span style="width:55px;text-align:right;color:var(--muted);font-size:0.75rem;">${catSeen}/${catQCount}問</span>
      <div class="cat-bar"><div class="cat-bar-fill" style="width:${catAcc}%;background:${barColor}"></div></div>
    </div>`;
  }).join('');

  // Weak questions count
  const weakCount = state.wrongQuestions.length;

  // Sessions
  const recentSessions = state.sessions.slice(-5).reverse();
  const sessionHTML = recentSessions.length > 0 ? `
    <div style="margin-top:12px;">
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:6px;">過去のセッション</div>
      ${recentSessions.map(s => {
        const d = new Date(s.started);
        const dateStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
        const sAcc = s.answered > 0 ? Math.round(s.correct / s.answered * 100) : 0;
        return `<div class="session-row">
          <span>${dateStr}</span>
          <span>${s.answered}問</span>
          <span style="font-weight:600;color:${sAcc >= 80 ? 'var(--correct)' : sAcc >= 50 ? '#f59e0b' : 'var(--wrong)'}">${sAcc}%</span>
        </div>`;
      }).join('')}
    </div>` : '';

  content.innerHTML = `
    <div class="stats-grid">
      <div class="stats-card">
        <div class="sc-label">累計出題</div>
        <div class="sc-value">${state.totalAnswered}問</div>
      </div>
      <div class="stats-card">
        <div class="sc-label">累計正答率</div>
        <div class="sc-value" style="color:${acc >= 80 ? 'var(--correct)' : acc >= 50 ? '#f59e0b' : 'var(--wrong)'}">${acc}%</div>
      </div>
      <div class="stats-card">
        <div class="sc-label">出題済み</div>
        <div class="sc-value">${seen}/${total}問</div>
      </div>
      <div class="stats-card">
        <div class="sc-label">苦手問題</div>
        <div class="sc-value" style="color:${weakCount > 0 ? 'var(--wrong)' : 'var(--correct)'}">${weakCount}問</div>
      </div>
      <div class="stats-card">
        <div class="sc-label">最大連続正解</div>
        <div class="sc-value" style="color:var(--primary)">🔥 ${state.maxStreak}</div>
      </div>
    </div>
    <div style="font-size:0.8rem;color:var(--muted);margin-bottom:6px;">カテゴリ別正答率</div>
    ${catHTML}
    ${sessionHTML}
  `;
}

function exportStats() {
  const acc = state.totalAnswered > 0 ? Math.round(state.correctAnswered / state.totalAnswered * 100) : 0;
  const lines = [
    'Sアセス クイズ結果',
    `日時: ${new Date().toLocaleString('ja-JP')}`,
    `累計: ${state.totalAnswered}問 / 正答率: ${acc}%`,
    `正解: ${state.correctAnswered} / 不正解: ${state.wrongAnswered}`,
    '',
    'カテゴリ別:'
  ];
  categories.forEach(c => {
    const cs = state.categoryStats[c] || { total: 0, correct: 0 };
    const catAcc = cs.total > 0 ? Math.round(cs.correct / cs.total * 100) : 0;
    lines.push(`  ${c}: ${catAcc}% (${cs.correct}/${cs.total})`);
  });
  if (state.wrongQuestions.length > 0) {
    lines.push('');
    lines.push('苦手問題:');
    state.wrongQuestions.forEach(q => {
      lines.push(`  - ${q.question.substring(0, 50)}...`);
    });
  }
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    alert('結果をクリップボードにコピーしました');
  }).catch(() => {
    // Fallback for older Safari
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('結果をクリップボードにコピーしました');
  });
}

function resetStats() {
  if (!confirm('学習記録をすべてリセットしますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  state.totalAnswered = 0;
  state.correctAnswered = 0;
  state.wrongAnswered = 0;
  state.questionStats = {};
  state.categoryStats = {};
  state.sessions = [];
  state.wrongQuestions = [];
  state.history = [];
  state.streak = 0;
  state.maxStreak = 0;
  updateStreakBanner();
  categories.forEach(c => {
    state.categoryStats[c] = { total: 0, correct: 0 };
  });
  updateStats();
  renderHistory();
  renderStatsPanel();
}

// Save session on page unload
window.addEventListener('beforeunload', function() {
  if (state.currentSession.answered > 0) {
    state.sessions.push(state.currentSession);
    if (state.sessions.length > 20) state.sessions = state.sessions.slice(-20);
    saveData();
  }
});

// Initialize
init();
